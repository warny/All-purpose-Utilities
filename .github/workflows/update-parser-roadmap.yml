name: Update parser roadmap

on:
  push:
    branches: [master]
    paths:
      - .github/workflows/update-parser-roadmap.yml

permissions:
  contents: write

jobs:
  update-roadmap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update Utils.Parser roadmap
        shell: python
        run: |
          from pathlib import Path

          path = Path("Utils.Parser/ROADMAP.md")
          text = path.read_text(encoding="utf-8")
          needle = "- Optimize only after behavior is locked down.\n\n## Roadmap phases"
          replacement = """- Optimize only after behavior is locked down.
- When parser and lexer paths share a stable algorithm, prefer composition: a common engine owns the invariant algorithm, a parser- or lexer-specific strategy owns only the true variation points, and small immutable context values carry traversal state.
- Prefer immutable descriptors over behavioral interfaces when the differences are only generated names, locations, signatures, result expressions, or other configuration values.
- Do not hide parser/lexer differences behind `isLexer` booleans, domain switches spread through a common engine, or abstract base classes that require most of the algorithm to be overridden.

## Parser/lexer specialization refactor direction

Several generator paths currently follow the same overall algorithm while varying only by parser or lexer semantics. The intended refactoring model is:

1. a common engine owns traversal or emission order and the stable algorithm;
2. a specialized parser or lexer strategy supplies only domain-specific decisions;
3. small immutable context values carry changing state such as rule name, alternative index, and element index;
4. immutable descriptors are used for purely declarative emission differences;
5. explicit parser and lexer wrappers select the appropriate strategy or descriptor.

This direction applies incrementally to embedded-hook collection, runtime dispatcher generation, and generated hook-method emission. Parser-specific left recursion, alternative priority ordering, quantifier/negation index semantics, lexer modes, runtime context types, method signatures, result values, and fallback calls remain explicit variation points.

The work must be split into reviewable stages:

- shared embedded-hook collection engine with parser and lexer strategies;
- shared runtime dispatcher emitter with specialized descriptors or strategies;
- shared generated hook-method emitter with specialized signatures and result handling;
- architectural consolidation and Roslyn guards preventing duplicated parallel algorithms from returning.

Each stage must preserve generated C# text, hook ordering and indexes, transformation calls, fallback behavior, diagnostics, and public API. This refactoring is an internal generator architecture change and must not alter parser authority or lexer/runtime semantics.

## Roadmap phases"""
          if text.count(needle) != 1:
              raise SystemExit("Expected roadmap insertion point was not found exactly once.")
          path.write_text(text.replace(needle, replacement), encoding="utf-8")

          Path(".github/workflows/update-parser-roadmap.yml").unlink()

      - name: Commit roadmap update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Utils.Parser/ROADMAP.md .github/workflows/update-parser-roadmap.yml
          git commit -m "Document parser and lexer strategy refactor direction"
          git push
